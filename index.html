<script>
  const bookingEmail = 'hello@lisapearsonskin.com';
  const displayEmail = document.getElementById('displayEmail');
  if (displayEmail) displayEmail.textContent = bookingEmail;

  const bookingForm = document.getElementById('bookingForm');
  if (bookingForm) {
    bookingForm.addEventListener('submit', function (e) {
      e.preventDefault();
      const data = new FormData(e.target);
      const subject = encodeURIComponent('New Skin Care Booking Request');
      const body = encodeURIComponent(
        'Name: ' + (data.get('name') || '') + '\n' +
        'Email: ' + (data.get('email') || '') + '\n' +
        'Phone: ' + (data.get('phone') || '') + '\n' +
        'Preferred Date: ' + (data.get('date') || '') + '\n' +
        'Concern: ' + (data.get('concern') || '') + '\n\n' +
        'Message:\n' + (data.get('message') || '')
      );
      window.location.href = 'mailto:' + bookingEmail + '?subject=' + subject + '&body=' + body;
    });
  }

  const newsletterForm = document.getElementById('newsletterForm');
  if (newsletterForm) {
    newsletterForm.addEventListener('submit', function (e) {
      e.preventDefault();
      const data = new FormData(e.target);
      const subject = encodeURIComponent('Newsletter Signup');
      const body = encodeURIComponent(
        'Name: ' + (data.get('name') || '') + '\n' +
        'Email: ' + (data.get('email') || '') + '\n' +
        'Interests: ' + (data.get('interest') || '')
      );
      window.location.href = 'mailto:' + bookingEmail + '?subject=' + subject + '&body=' + body;
    });
  }
</script>
